<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HMS – Our People</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: 'Nunito', sans-serif;
          min-height: 100vh;
          background: #fdf8ff;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 24px;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 20px;
          max-width: 1100px;
          width: 100%;
        }

        @media (max-width: 900px) {
          .grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 560px) {
          .grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Card ── */
        .card {
          display: flex;
          flex-direction: column;
          align-items: center;
          background: #fff;
          border-radius: 24px;
          padding: 28px 16px 22px;
          border: 1.5px solid #f0e6ff;
          text-decoration: none;
          position: relative;
          overflow: hidden;
          transition: transform 0.25s ease, box-shadow 0.25s ease;
          animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .card:nth-child(1) { animation-delay: 0.05s; --c: #a78bfa; --clight: #f3eeff; }
        .card:nth-child(2) { animation-delay: 0.12s; --c: #fb923c; --clight: #fff4ed; }
        .card:nth-child(3) { animation-delay: 0.19s; --c: #34d399; --clight: #edfdf8; }
        .card:nth-child(4) { animation-delay: 0.26s; --c: #60a5fa; --clight: #eff6ff; }
        .card:nth-child(5) { animation-delay: 0.33s; --c: #f472b6; --clight: #fdf2f8; }

        @keyframes popIn {
          from { opacity: 0; transform: scale(0.85) translateY(16px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card:hover {
          transform: translateY(-8px);
          box-shadow: 0 16px 40px color-mix(in srgb, var(--c) 22%, transparent);
        }

        /* top dot accent */
        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 50%; transform: translateX(-50%);
          width: 48px; height: 4px;
          border-radius: 0 0 8px 8px;
          background: var(--c);
          transition: width 0.3s ease;
        }
        .card:hover::before { width: 90px; }

        /* ── Photo ── */
        .photo {
          width: 100px; height: 100px;
          border-radius: 50%;
          overflow: hidden;
          border: 3px solid var(--clight);
          outline: 3px solid var(--c);
          outline-offset: 3px;
          background: var(--clight);
          display: flex; align-items: center; justify-content: center;
          margin-bottom: 18px;
          transition: outline-color 0.25s, transform 0.25s;
        }
        .card:hover .photo { transform: scale(1.06); }

        .photo img {
          width: 100%; height: 100%;
          object-fit: cover; display: block;
        }

        .initials {
          font-size: 28px; font-weight: 800;
          color: var(--c);
        }

        /* ── Name link ── */
        .name-link {
          font-size: 1rem;
          font-weight: 800;
          color: #1e1b4b;
          text-decoration: none;
          text-align: center;
          line-height: 1.3;
          position: relative;
          padding-bottom: 3px;
          transition: color 0.2s;
        }
        .name-link::after {
          content: '';
          position: absolute;
          bottom: 0; left: 50%; transform: translateX(-50%);
          width: 0; height: 2px;
          background: var(--c);
          border-radius: 2px;
          transition: width 0.25s ease;
        }
        .card:hover .name-link { color: var(--c); }
        .card:hover .name-link::after { width: 100%; }
    </style>
</head>
<body>

<div class="grid">
    <div th:each="member, iter : ${team}" class="card">

        <div class="photo">
            <img th:src="@{/images/{id}.jpg(id=${member.id})}"
                 th:alt="${member.name}"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
            <span class="initials" style="display:none;" th:text="${member.initials}">AB</span>
        </div>

        <a th:href="@{/sections/{id}(id=${member.id})}"
           th:text="${member.name}"
           class="name-link">Full Name</a>

    </div>
</div>

</body>
</html>
